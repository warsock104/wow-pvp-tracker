<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      overflow: hidden;
      padding: 0 2px 6px;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .cls-btn {
      aspect-ratio: 1;
      width: 100%;
      border-radius: 6px;
      border: 2px solid #3a3a3a;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.28;
      padding: 0;
      background: none;
      display: block;
      transition: opacity 0.12s, border-color 0.12s;
    }

    .cls-btn:hover {
      opacity: 0.6 !important;
    }

    .cls-btn.on {
      opacity: 1;
    }

    .cls-btn img {
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="grid"></div>
  <script>
    var classData   = [];
    var selected    = new Set();
    var initialized = false;

    function post(type, payload) {
      window.parent.postMessage(
        Object.assign({ isStreamlitMessage: true, type: type }, payload || {}),
        "*"
      );
    }

    function syncHeight() {
      var h = document.getElementById("grid").getBoundingClientRect().height;
      post("streamlit:setFrameHeight", { height: Math.ceil(h) + 10 });
    }

    function render() {
      var grid = document.getElementById("grid");
      grid.innerHTML = "";

      classData.forEach(function(cls) {
        var isSel = selected.has(cls.name);

        var btn = document.createElement("button");
        btn.className  = "cls-btn" + (isSel ? " on" : "");
        btn.title      = cls.name;
        btn.style.borderColor = isSel ? (cls.color || "#555555") : "#3a3a3a";

        if (cls.icon) {
          var img = document.createElement("img");
          img.src = cls.icon;
          img.alt = cls.name;
          btn.appendChild(img);
        }

        btn.addEventListener("click", function() {
          if (selected.has(cls.name)) {
            if (selected.size > 1) selected.delete(cls.name);
          } else {
            selected.add(cls.name);
          }
          render();
          post("streamlit:setComponentValue", {
            value:    Array.from(selected),
            dataType: "json"
          });
        });

        grid.appendChild(btn);
      });

      syncHeight();
    }

    window.addEventListener("message", function(e) {
      if (!e.data) return;

      if (e.data.type === "streamlit:render") {
        var args = e.data.args || {};

        // Match sidebar background to Streamlit theme
        var bg = (e.data.theme && e.data.theme.backgroundColor) || "transparent";
        document.body.style.background = bg;

        classData = args.classes || [];

        // Only set selection from Python on first render.
        // After that, keep local state — Streamlit sends the old args.selected
        // on every rerun (before the new value is processed), which would
        // otherwise reset the component's visual state and cause flicker.
        if (!initialized) {
          initialized = true;
          selected = new Set(
            args.selected && args.selected.length
              ? args.selected
              : classData.map(function(c) { return c.name; })
          );
        }

        render();
      }
    });

    post("streamlit:componentReady", { apiVersion: 1 });
  </script>
</body>
</html>
